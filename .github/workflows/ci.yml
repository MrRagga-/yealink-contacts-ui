name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend tests and typing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: true
          cache-dependency-glob: app/backend/uv.lock

      - name: Install Python
        working-directory: app/backend
        run: uv python install 3.12

      - name: Sync backend dependencies
        working-directory: app/backend
        run: uv sync --locked --extra dev

      - name: Run backend tests
        working-directory: app/backend
        env:
          APP_SECRET_KEY: ci-test-secret
          ENCRYPTION_KEY: S4aexYnjREGeQkSQIlPCXSQLgXUhY_GfJ1i1n1a34zg=
          DATABASE_URL: sqlite:///./ci_test.db
        run: uv run pytest

      - name: Run backend type checks
        working-directory: app/backend
        run: uv run ty check src

  frontend:
    name: Frontend test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: app/frontend
        run: npm run test -- --run

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build
