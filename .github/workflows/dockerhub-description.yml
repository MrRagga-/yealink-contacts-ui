name: Docker Hub description

on:
  push:
    branches:
      - main
      - master
    paths:
      - README.md
      - .github/workflows/dockerhub-description.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/yealink-contacts-ui
          short-description: Yealink Contacts Sync backend and frontend container images
          readme-filepath: ./README.md
