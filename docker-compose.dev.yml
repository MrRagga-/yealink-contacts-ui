services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yealink_contacts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yealink_contacts"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_DEV_IMAGE:-yealink-contacts-backend:dev}
    build:
      context: .
      dockerfile: app/backend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/yealink_contacts}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: >
      /bin/sh -c "alembic upgrade head && exec python -m uvicorn yealink_contacts.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: ${FRONTEND_DEV_IMAGE:-yealink-contacts-frontend:dev}
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres-data:
