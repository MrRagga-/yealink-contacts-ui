services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yealink_contacts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yealink_contacts"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/yealink_contacts}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      PHONEBOOK_BASE_URL: ${PHONEBOOK_BASE_URL:-http://localhost:8000}
      XML_PUBLIC_BASE_URL: ${XML_PUBLIC_BASE_URL:-http://localhost:8000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      /bin/sh -c "uv run alembic upgrade head && uv run uvicorn yealink_contacts.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
